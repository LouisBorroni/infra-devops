services:
  db:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    restart: unless-stopped
    image: ghcr.io/louisborroni/infra-devops/server:latest
    ports:
      - "${PORT}:${PORT}"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: ${PORT}
    depends_on:
      db:
        condition: service_healthy

  client:
    restart: unless-stopped
    image: ghcr.io/louisborroni/infra-devops/client:latest
    ports:
      - "${CLIENT_PORT}:80"
    environment:
      API_URL: ${INTERNAL_API_URL}
    depends_on:
      - server
