name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'esgi-2603-my-favorite-places/server/**'
            client:
              - 'esgi-2603-my-favorite-places/client/**'

  build-server:
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: supersecret
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ./esgi-2603-my-favorite-places/server
        run: yarn install --frozen-lockfile

      - name: Run tests
        working-directory: ./esgi-2603-my-favorite-places/server
        run: yarn test

      - name: Build server
        working-directory: ./esgi-2603-my-favorite-places/server
        run: yarn build

      - name: Start server
        working-directory: ./esgi-2603-my-favorite-places/server
        run: node dist/index.js &
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: supersecret
          DB_NAME: postgres
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000/api/users/me --timeout 15000 --httpTimeout 15000 || true

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno tests
        working-directory: ./esgi-2603-my-favorite-places/bruno
        run: bru run create-user.yml connection.yml

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./esgi-2603-my-favorite-places/server
          push: true
          tags: ghcr.io/louisborroni/infra-devops/server:latest

  build-client:
    needs: changes
    if: ${{ needs.changes.outputs.client == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./esgi-2603-my-favorite-places/client
          push: true
          tags: ghcr.io/louisborroni/infra-devops/client:latest

  e2e:
    needs: changes
    if: ${{ needs.changes.outputs.client == 'true' || needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: supersecret
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install server dependencies
        working-directory: ./esgi-2603-my-favorite-places/server
        run: yarn install --frozen-lockfile

      - name: Build server
        working-directory: ./esgi-2603-my-favorite-places/server
        run: yarn build

      - name: Start server
        working-directory: ./esgi-2603-my-favorite-places/server
        run: node dist/index.js &
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: supersecret
          DB_NAME: postgres
          PORT: 3000

      - name: Install client dependencies
        working-directory: ./esgi-2603-my-favorite-places/client
        run: yarn install --frozen-lockfile

      - name: Build client
        working-directory: ./esgi-2603-my-favorite-places/client
        run: yarn build
        env:
          API_URL: http://localhost:3000

      - name: Start client
        working-directory: ./esgi-2603-my-favorite-places/client
        run: yarn preview --host --port 4173 &
        env:
          API_URL: http://localhost:3000

      - name: Wait for services
        run: npx wait-on http://localhost:4173 http://localhost:3000/api/users/me --timeout 30000 --httpTimeout 30000 || true

      - name: Run Cypress tests
        working-directory: ./esgi-2603-my-favorite-places/client
        run: yarn test:e2e
        env:
          CYPRESS_BASE_URL: http://localhost:4173
