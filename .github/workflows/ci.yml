name: CI

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ./esgi-2603-my-favorite-places/server
        run: yarn install --frozen-lockfile

      - name: Run tests
        working-directory: ./esgi-2603-my-favorite-places/server
        run: yarn test

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./esgi-2603-my-favorite-places/server
          push: true
          tags: ghcr.io/louisborroni/infra-devops/server:latest

      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: ./esgi-2603-my-favorite-places/client
          push: true
          tags: ghcr.io/louisborroni/infra-devops/client:latest
